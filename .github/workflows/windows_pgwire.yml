name: Windows PGWire Tests

on:
  pull_request:
    types: [synchronize, opened, reopened]
  workflow_dispatch:

jobs:
  windows-pgwire:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@4d1965c9142484e48d40c19de54b5cba84953a06
        with:
          toolchain: nightly-2025-09-24
          rustflags: ""
      - name: Run pgwire tests
        shell: bash
        run: |
          mvn clean test \
            --batch-mode --quiet \
            "-Dtest.include=**/pgwire/**/*.java" \
            "-Dtest.exclude=**/O3*Test**,**/**Fuzz**" \
            -Dout=ci/qlog.conf \
            -DfailIfNoTests=false \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -P build-web-console
        env:
          MAVEN_OPTS: "-Xlog:gc -Dfile.encoding=UTF-8 -Xmx2g -XX:+UseParallelGC"
          QDB_TEST_WINDOWS_SYMLINKS: "1"
        timeout-minutes: 55
      - name: Upload crash logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs
          path: core/hs_*.log
          retention-days: 5
