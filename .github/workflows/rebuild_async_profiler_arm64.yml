name: Build and Commit async-profiler Library (aarch64)
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: asprof-arm64-${{ github.ref }}
  cancel-in-progress: false
# This workflow is triggered manually from the Actions tab.
# It builds the async-profiler native library for Linux aarch64 from source
# and commits it to the current branch, providing a full audit trail.
#
# It mirrors rebuild_async_profiler.yml (Linux x86-64); only the runner,
# builder image and output directory differ. Run it on the same branch as the
# x86-64 workflow so both architectures stay on the same async-profiler version.
#
# The async-profiler submodule is located at: core/src/main/c/share/async-profiler
# The built library will be placed at: core/src/main/bin/linux-aarch64/libasyncProfiler.so

jobs:
  build-async-profiler:
    # GitHub-hosted arm64 Linux runner (free for public repositories).
    runs-on: ubuntu-24.04-arm
    container:
      # The musl builder image async-profiler uses for its own official
      # linux-arm64 release builds (see async-profiler .github/workflows/build.yml,
      # container-image "arm"). Built from docker/debian.Dockerfile, the same
      # source as the x86-64 sibling image.
      # NOTE: rebuild_async_profiler.yml pins the x86 image by digest. Pin the arm
      # image by digest here too for a stricter audit trail once it can be
      # resolved, e.g. `docker manifest inspect <image>:latest`.
      image: public.ecr.aws/async-profiler/asprof-builder-arm:latest
    steps:
      - name: Patch Debian buster repo and install dependencies
        run: |
          set -eu
          sed -i s/deb.debian.org/archive.debian.org/g /etc/apt/sources.list
          apt-get update -y
          apt-get install git file -y

      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Get async-profiler version info
        id: version
        run: |
          set -eu
          cd core/src/main/c/share/async-profiler
          ASYNC_VERSION=$(git describe --tags --always)
          ASYNC_SHA=$(git rev-parse --short=8 HEAD)
          echo "version=$ASYNC_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$ASYNC_SHA" >> "$GITHUB_OUTPUT"
          echo "Building async-profiler version: $ASYNC_VERSION (commit: $ASYNC_SHA)"

      - name: Build async-profiler
        run: |
          set -eu
          cd core/src/main/c/share/async-profiler
          # Build release tarball (same as official async-profiler releases)
          # This includes patchelf optimizations, again, the official builds do the same
          make CC=/usr/local/musl/bin/musl-gcc release

          # Extract the library and binaries from the release tarball
          TARBALL=""
          for f in async-profiler-*.tar.gz; do
            # Skip if glob didn't match any files
            [ -f "$f" ] || continue
            case "$f" in
              *debug*) continue ;;
              *) TARBALL="$f"; break ;;
            esac
          done
          [ -n "$TARBALL" ] || { echo "No release tarball found"; exit 1; }
          echo "Extracting from: $TARBALL"

          # Extract library
          tar -xzf "$TARBALL" --strip-components=2 --wildcards "*/lib/libasyncProfiler.so"

          # Extract binaries
          tar -xzf "$TARBALL" --strip-components=2 --wildcards "*/bin/asprof"
          tar -xzf "$TARBALL" --strip-components=2 --wildcards "*/bin/jfrconv"

          ls -la libasyncProfiler.so asprof jfrconv
          echo "Library dependencies:"
          ldd libasyncProfiler.so || true
          echo "Binary info:"
          file asprof jfrconv

      - name: Copy library and binaries to target location
        run: |
          set -eu
          mkdir -p core/src/main/bin/linux-aarch64/
          cp core/src/main/c/share/async-profiler/libasyncProfiler.so core/src/main/bin/linux-aarch64/
          cp core/src/main/c/share/async-profiler/asprof core/src/main/bin/linux-aarch64/
          cp core/src/main/c/share/async-profiler/jfrconv core/src/main/bin/linux-aarch64/
          ls -la core/src/main/bin/linux-aarch64/
          file core/src/main/bin/linux-aarch64/*
          ldd core/src/main/bin/linux-aarch64/libasyncProfiler.so || true

      - name: Commit and push changes
        run: |
          set -eu
          # Configure git and fix ownership issues
          git config --global --add safe.directory '*'
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

          git add core/src/main/bin/linux-aarch64/libasyncProfiler.so
          git add core/src/main/bin/linux-aarch64/asprof
          git add core/src/main/bin/linux-aarch64/jfrconv

          # remove execute permission for library, keep for binaries
          git update-index --chmod=-x core/src/main/bin/linux-aarch64/libasyncProfiler.so
          git update-index --chmod=+x core/src/main/bin/linux-aarch64/asprof
          git update-index --chmod=+x core/src/main/bin/linux-aarch64/jfrconv

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          cat << EOF > commit_message.txt
          chore(build): rebuild async-profiler library and binaries for Linux aarch64 [skip ci]

          Built from async-profiler ${{ steps.version.outputs.version }} (commit: ${{ steps.version.outputs.sha }})
          Build timestamp: ${TIMESTAMP}
          GitHub Action: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          EOF

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit --author="${GITHUB_ACTOR} <${GITHUB_ACTOR}@users.noreply.github.com>" -F commit_message.txt

          # Push to current branch
          git push origin HEAD

          echo "Successfully committed and pushed async-profiler library update"

      - name: Summary
        run: |
          set -eu
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **async-profiler library and binaries rebuilt and committed successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.version.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files**: \`core/src/main/bin/linux-aarch64/libasyncProfiler.so\`, \`asprof\`, \`jfrconv\`" >> $GITHUB_STEP_SUMMARY
