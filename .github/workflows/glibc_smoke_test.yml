name: GLIBC Smoke Test
# Testing GLIBC compatibility

on:
  # Seed the GitHub Actions cache on master so PRs get cache hits on first run
  # Reasoning: cache are not shared across branches, but feature branches can read from the default branch cache
  # So we need to run the build on master to populate the cache.
  push:
    branches: [master]
    paths:
      - "**/pom.xml"
  pull_request:
    types: [synchronize, opened, reopened, edited]
    paths:
      - "core/src/main/resources/io/questdb/bin/**"
      - "./core/src/main/bin/**"
  workflow_dispatch:

jobs:
  amd64:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }} # Only run on non-forked PRs
    runs-on: ubuntu-22.04
    container:
      # Use Amazon Linux 2 image - uses GLIBC 2.26
      image: amazonlinux:2
      volumes:
        - /nodeglibc217:/nodeglibc217
        - /nodeglibc217:/__e/node20
        - /nodeglibc217:/__e/node24
    steps:
      - name: Install dependencies
        run: yum install -y curl git tar gunzip xz wget
      - name: Print GLIBC version
        run: ldd --version
      - name: Install glibc 2.17-compatible Node.js
        # A hack to override the runner's Node.js with a build compatible with older glibc.
        # Inspired by https://github.com/pytorch/test-infra/pull/5959 If it's good for pytorch, it's good for us too! :)
        # Q: Why do we need this hack at all? A: Many GitHub actions, e.g. actions/checkout, run on Node.js.
        # GitHub deprecated Node.js 20 and now forces actions onto its Node.js 24 build, which needs a newer glibc
        # than Amazon Linux 2 has. Node.js 24 has no glibc 2.17 build, so we install the newest glibc 2.17-compatible
        # release (Node.js 22 LTS) and mount it over both /__e/node20 and /__e/node24, so it is used no matter which
        # runtime the runner picks.
        run: |
          curl -LO https://unofficial-builds.nodejs.org/download/release/v22.22.3/node-v22.22.3-linux-x64-glibc-217.tar.xz
          tar -xf node-v22.22.3-linux-x64-glibc-217.tar.xz --strip-components 1 -C /nodeglibc217
          ldd /__e/node24/bin/node
      - uses: actions/checkout@v5
      - name: Cache JDK
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/Java_Temurin-Hotspot_jdk
          key: java-temurin-25-${{ runner.os }}-${{ runner.arch }}
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - name: Cache Maven installation and repository
        id: maven-cache
        uses: actions/cache@v5
        with:
          path: |
            /opt/apache-maven-3.9.9
            /root/.m2/repository
          key: maven-3.9.9-repo-${{ runner.arch }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-3.9.9-repo-${{ runner.arch }}-
      - name: Install Apache Maven
        if: steps.maven-cache.outputs.cache-hit != 'true'
        # Amazon Linux 2 has too old version of Maven, so we need to install a newer one
        run: |
          wget https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.tar.gz
          tar xf apache-maven-3.9.9-bin.tar.gz -C /opt
      - name: Setup Maven
        run: |
          ln -sf /opt/apache-maven-3.9.9 /opt/maven
          echo "MAVEN_HOME=/opt/maven" >> $GITHUB_ENV
          echo "PATH=/opt/maven/bin:$PATH" >> $GITHUB_ENV
      - name: Detect local client profile
        id: client
        uses: ./.github/actions/detect-local-client
      - name: Build distribution
        run: /opt/maven/bin/mvn -B clean install -Dmaven.test.skip=true -Pbuild-binaries -pl '!benchmarks' ${{ steps.client.outputs.client_profile }}
        env:
          MAVEN_OPTS: "-XX:+UseParallelGC"
      - name: Unpack distribution
        run: tar -xzf core/target/questdb-*-no-jre-bin.tar.gz
      - name: Start QuestDB
        run: ./questdb-*bin/questdb.sh start
      - name: Query database with curl
        run: |
          curl -G --data-urlencode \
              "query=SELECT * FROM long_sequence(1)" \
              http://localhost:9000/exp
      - name: Upload logs
        if: failure() # Only upload logs if the job failed
        uses: actions/upload-artifact@v6
        with:
          path: ~/.questdb/log/*
          name: logs
          retention-days: 5
  aarch64:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }} # Only run on non-forked PRs
    runs-on: ubuntu-22.04-arm
    container:
      # Use AlmaLinux 8 image - uses GLIBC 2.28
      image: almalinux:8
    steps:
      - name: Install dependencies
        run: dnf install -y curl zip unzip git bash wget
      - name: Print GLIBC version
        run: ldd --version
      - uses: actions/checkout@v5
      - name: Cache JDK
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/Java_Temurin-Hotspot_jdk
          key: java-temurin-25-${{ runner.os }}-${{ runner.arch }}
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - name: Cache Maven installation and repository
        id: maven-cache
        uses: actions/cache@v5
        with:
          path: |
            /opt/apache-maven-3.9.9
            /root/.m2/repository
          key: maven-3.9.9-repo-${{ runner.arch }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-3.9.9-repo-${{ runner.arch }}-
      - name: Install Maven
        if: steps.maven-cache.outputs.cache-hit != 'true'
        # AlmaLinux 8 has too old version of Maven, so we need to install a newer one
        run: |
          wget https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.tar.gz
          tar xf apache-maven-3.9.9-bin.tar.gz -C /opt
      - name: Setup Maven
        run: |
          ln -sf /opt/apache-maven-3.9.9 /opt/maven
          echo "MAVEN_HOME=/opt/maven" >> $GITHUB_ENV
          echo "/opt/maven/bin" >> $GITHUB_PATH
      - name: Detect local client profile
        id: client
        uses: ./.github/actions/detect-local-client
      - name: Build distribution
        run: mvn -B clean install -Dmaven.test.skip=true -Pbuild-binaries -pl '!benchmarks' ${{ steps.client.outputs.client_profile }}
        env:
          MAVEN_OPTS: "-XX:+UseParallelGC"
      - name: Unpack distribution
        run: tar -xzf core/target/questdb-*-no-jre-bin.tar.gz
      - name: Start QuestDB
        run: ./questdb-*bin/questdb.sh start
      - name: Query database with curl
        run: |
          curl -G --data-urlencode \
              "query=SELECT * FROM long_sequence(1)" \
              http://localhost:9000/exp
      - name: Upload logs
        if: failure() # Only upload logs if the job failed
        uses: actions/upload-artifact@v6
        with:
          path: ~/.questdb/log/*
          name: logs
          retention-days: 5
