writers=file,stdout

w.file.class=io.questdb.log.LogFileWriter
w.file.location=tests.log
w.file.level=DEBUG,INFO,ERROR
# truncate=true makes LogFileWriter open via Files.openRW (carries FILE_SHARE_WRITE) instead of
# Files.openAppend, so a reused surefire fork's 2nd LogFactory open of this file doesn't die on
# Windows with ERROR_SHARING_VIOLATION (errno=32). Trade-off: re-open truncates. See LogFileWriter.
w.file.truncate=true

w.stdout.class=io.questdb.log.LogConsoleWriter
w.stdout.level=INFO,ERROR
