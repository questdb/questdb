steps:
  - bash: |
      # Apply only to Hetzner self-hosted agents. AGENT_MACHINENAME is the
      # agent's self-configured name (e.g. "hetzner-incus-12"), distinct
      # from the OS hostname and from the timeline's workerName.
      if [[ "${AGENT_MACHINENAME:-}" != hetzner-incus-* ]]; then
        echo "Skipping on ${AGENT_MACHINENAME:-unknown}; only applied to hetzner-incus-* agents"
        exit 0
      fi
      # Abort any git HTTP transfer that averages below 100 KiB/s for 120s
      # so Azure's checkout retry picks a fresh TCP connection instead of
      # crawling for 30-60 min. Mitigates the per-flow upstream-network
      # stalls observed on the FSN1 dedicated-server boxes.
      git config --global http.lowSpeedLimit 102400
      git config --global http.lowSpeedTime 120
    displayName: "Set git low-speed abort thresholds"
  - checkout: self
    fetchDepth: 1
    lfs: false
    submodules: false
  - template: detect-local-client.yml
  - bash: |
      if curl -sf --connect-timeout 2 http://maven.internal:8081/ > /dev/null 2>&1; then
        echo "Private Reposilite cache reachable, using hetzner maven settings"
        echo "##vso[task.setvariable variable=MAVEN_SETTINGS_FILE]$(Build.SourcesDirectory)/ci/maven-settings-hetzner.xml"
        # Allow HTTP keep-alive when routing through the private Reposilite cache.
        # -Dhttp.keepAlive=false opens a new TCP connection per artifact; the single-IP cache
        # reached over the Hetzner vSwitch can't absorb that connection churn under concurrent
        # builds (intermittent "Connect to maven.internal:8081 ... Connection timed out", which
        # the failover-less mirror turns into a build failure). Reusing connections avoids it.
        # NOTE: this toggle only affects the default HttpClient resolver transport. Tasks that
        # run with -Dmaven.resolver.transport=wagon ignore it and instead pool connections via
        # -Dmaven.wagon.httpconnectionManager.ttlSeconds (already set in MAVEN_RUN_OPTS).
        echo "##vso[task.setvariable variable=MAVEN_KEEPALIVE_OPT]"
      else
        echo "Private Reposilite not reachable, using default maven settings"
        echo "##vso[task.setvariable variable=MAVEN_SETTINGS_FILE]$(Build.SourcesDirectory)/ci/maven-settings.xml"
        # Direct-to-Central path: keep historical behaviour (no connection reuse).
        echo "##vso[task.setvariable variable=MAVEN_KEEPALIVE_OPT]-Dhttp.keepAlive=false"
      fi
    displayName: "Select Maven settings (local proxy vs default)"
  - bash: |
      rm -rf /tmp/junit* /tmp/surefire-agent /tmp/libquestdbr* /tmp/libqdbsqllogic*
    displayName: "Cleanup dangling test artifacts from /tmp"
    condition: startsWith(variables['poolName'], 'hetzner-')
  - bash: sudo sysctl -w fs.file-max=500000
    displayName: "Increase file count on Linux"
    condition: |
      and(
        eq(variables['os'], 'Linux'),
        ne(variables['poolName'], 'hetzner-incus'),
        ne(variables['poolName'], 'hetzner-incus-arm'),
        ne(variables['poolName'], 'hetzner-incus-zfs')
      )
  - bash: |
      JAVA_PATH="/usr/lib/jvm/java-25-openjdk-amd64"
      echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_PATH"
      echo "##vso[task.setvariable variable=JAVA_HOME_25_X64]$JAVA_PATH"
      echo "JAVA_HOME will be set to: $JAVA_PATH"
    displayName: "Activate JDK 25 (openjdk amd64)"
    condition: |
      and(
        ne(variables['System.JobName'], 'linux_x64_graal'),
        or(
          eq(variables['poolName'], 'hetzner-incus'),
          eq(variables['poolName'], 'hetzner-incus-zfs')
        )
      )
  - bash: |
      JAVA_PATH="/usr/lib/jvm/java-25-openjdk-arm64"
      echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_PATH"
      echo "##vso[task.setvariable variable=JAVA_HOME_25_X64]$JAVA_PATH"
      echo "JAVA_HOME will be set to: $JAVA_PATH"
    displayName: "Activate JDK 25 (openjdk arm64)"
    condition: |
      eq(variables['poolName'], 'hetzner-incus-arm')
  - bash: |
      JAVA_PATH="/opt/graalvm-25"
      echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_PATH"
      echo "##vso[task.setvariable variable=JAVA_HOME_25_X64]$JAVA_PATH"
      echo "JAVA_HOME will be set to: $JAVA_PATH"
    displayName: "Activate GraalVM 25"
    condition: |
      eq(variables['System.JobName'], 'linux_x64_graal')
  # Compile the client's native library from source when building it as a
  # -SNAPSHOT (local-client). A Maven-Central client ships the binaries in its
  # jar, so this is a no-op there. Runs after JDK activation so $JAVA_HOME points
  # at the JDK whose jni.h CMake builds against.
  - template: build-client-native.yml
  - task: Cache@2
    displayName: "Cache non-default Maven"
    continueOnError: true
    inputs:
      key: '"maven_version" | "$(MAVEN_VERSION)"'
      path: $(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)
      cacheHitVar: MVN_CACHE_RESTORED
    condition: |
      and(
        ne(variables['MAVEN_VERSION_OPTION'], 'Default'),
        ne(variables['poolName'], 'hetzner-incus'),
        ne(variables['poolName'], 'hetzner-incus-arm'),
        ne(variables['poolName'], 'hetzner-incus-zfs')
      )
  - task: Cache@2
    displayName: "Cache .m2/repository"
    continueOnError: true
    inputs:
      key: '"questdb_main" | "$(Agent.OS)" | "$(jdk)" | "maven"'
      path: $(MAVEN_CACHE_FOLDER)
    condition: |
      and(
        ne(variables['poolName'], 'hetzner-incus'),
        ne(variables['poolName'], 'hetzner-incus-arm'),
        ne(variables['poolName'], 'hetzner-incus-zfs')
      )
  - task: Cache@2
    displayName: "Cache .cargo/registry"
    continueOnError: true
    inputs:
      key: '"cargo-registry" | "$(RUSTC_HOST_TRIPLE)" | "$(RUSTC_RELEASE)" | "$(LINUX_GLIBC_VERSION)" | **/Cargo.lock'
      restoreKeys: |
        "cargo-registry" | "$(RUSTC_HOST_TRIPLE)" | "$(RUSTC_RELEASE)" | "$(LINUX_GLIBC_VERSION)"
      path: $(CARGO_HOME)/registry
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['RUST_SOURCE_CODE_CHANGED'], 'true'),
        ne(variables['poolName'], 'hetzner-incus'),
        ne(variables['poolName'], 'hetzner-incus-arm'),
        ne(variables['poolName'], 'hetzner-incus-zfs')
      )
  - pwsh: New-Item -Path "$HOME/.m2/repository" -ItemType Directory -Force
    displayName: "Ensure .m2/repository exists (PowerShell)"
    condition: eq(variables['os'], 'Windows')
  - bash: mkdir -p "$HOME/.m2/repository"
    displayName: "Ensure .m2/repository exists (bash)"
    condition: ne(variables['os'], 'Windows')
  - script: "wget https://archive.apache.org/dist/maven/maven-3/$(MAVEN_VERSION)/binaries/apache-maven-$(MAVEN_VERSION)-bin.zip"
    displayName: "Get non-default Maven (bash)"
    condition: |
      and(
        ne(variables['MAVEN_VERSION_OPTION'], 'Default'),
        ne(variables.MVN_CACHE_RESTORED, 'true'),
        ne(variables['os'], 'Windows')
      )
  - pwsh: |
      "(new-object System.Net.WebClient).DownloadFile('https://www.apache.org/dist/maven/maven-3/$(MAVEN_VERSION)/binaries/apache-maven-$(MAVEN_VERSION)-bin.zip','$(build.sourcesdirectory)/apache-maven-$(MAVEN_VERSION)-bin.zip')"
    displayName: "Get non-default Maven (PowerShell)"
    condition: |
      and(
        ne(variables['MAVEN_VERSION_OPTION'], 'Default'),
        ne(variables.MVN_CACHE_RESTORED, 'true'),
        eq(variables['os'], 'Windows')
      )
  - task: ExtractFiles@1
    inputs:
      archiveFilePatterns: "apache-maven-$(MAVEN_VERSION)-bin.zip"
      destinationFolder: "$(build.sourcesdirectory)/maven"
    condition: and(ne(variables['MAVEN_VERSION_OPTION'], 'Default'), ne(variables.MVN_CACHE_RESTORED, 'true'))

  - script: python3 .github/prepare_rust_env.py --export-cargo-install-env --match core/rust/qdbr/rust-toolchain.toml
    displayName: "Ensure Rust is installed"
    # Note, the `prepare_rust_env.py` script exports a number of variables.

  - template: install-llvm.yml
    parameters:
      shouldRun: |
        and(
          startsWith(variables['testset'], 'coverage'),
          eq(variables['RUST_SOURCE_CODE_CHANGED'], 'true'),
          eq(variables['System.PullRequest.IsFork'], 'false')
        )

  - task: Maven@3
    displayName: "Compile with Maven"
    inputs:
      mavenVersionOption: "$(MAVEN_VERSION_OPTION)"
      mavenDirectory: "$(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)"
      mavenPomFile: "pom.xml"
      mavenOptions: "$(MAVEN_OPTS)"
      goals: "compile"
      options: "-s $(MAVEN_SETTINGS_FILE) $(javadoc_step) -DskipTests -P build-web-console$(javadoc_profile) -P qdbr-release $(CLIENT_PROFILE) $(MAVEN_RUN_OPTS)"
      jdkVersionOption: $(jdk)
    condition: |
      or(
        eq(variables['testset'], 'none'),
        eq(variables['SOURCE_CODE_CHANGED'], 'false')
      )
  - task: Maven@3
    displayName: "Run tests"
    inputs:
      mavenVersionOption: "$(MAVEN_VERSION_OPTION)"
      mavenDirectory: "$(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)"
      mavenPomFile: "pom.xml"
      mavenOptions: "-Xlog:gc -Dfile.encoding=UTF-8 $(MAVEN_OPTS)"
      goals: "clean test"
      options: "-s $(MAVEN_SETTINGS_FILE) --batch-mode --quiet $(TEST_REACTOR_ARGS) -Dtest.include=$(includeTests)
        -Dtest.exclude=$(excludeTests)
        -Dout=$(Build.SourcesDirectory)/ci/qlog.conf
        -DfailIfNoTests=false
        -Dsurefire.failIfNoSpecifiedTests=false
        $(WEB_CONSOLE_PROFILE)
        $(CLIENT_PROFILE) $(MAVEN_RUN_OPTS)"
      jdkVersionOption: $(jdk)
    env:
      QDB_TEST_WINDOWS_SYMLINKS: "1"
    timeoutInMinutes: 55
    condition: |
      and(
        eq(variables['testset'], 'all'),
        eq(variables['SOURCE_CODE_CHANGED'], 'true')
      )
  - bash: find . -name '*.profraw' -delete
    displayName: "Clean stale profraw files"
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['RUST_SOURCE_CODE_CHANGED'], 'true'),
        eq(variables['System.PullRequest.IsFork'], 'false')
      )
  - task: Maven@3
    displayName: "Pre-build for Coverage"
    inputs:
      mavenVersionOption: "$(MAVEN_VERSION_OPTION)"
      mavenDirectory: "$(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)"
      mavenPomFile: "pom.xml"
      mavenOptions: "$(MAVEN_OPTS)"
      goals: "install"
      options: "-s $(MAVEN_SETTINGS_FILE) --batch-mode -pl core -am -DskipTests
        -P build-web-console
        $(CLIENT_PROFILE) $(MAVEN_RUN_OPTS)"
      jdkVersionOption: $(jdk)
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['System.PullRequest.IsFork'], 'false'),
        or(
            eq(variables['CODE_COVERAGE_TOOL_OPTION'], 'JaCoCo'),
            eq(variables['RUST_SOURCE_CODE_CHANGED'], 'true')
        )
      )
  - task: Maven@3
    displayName: "Run tests with Coverage (jemalloc)"
    inputs:
      mavenVersionOption: "$(MAVEN_VERSION_OPTION)"
      mavenDirectory: "$(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)"
      mavenPomFile: "core/pom.xml"
      mavenOptions: "-Xlog:gc -Dfile.encoding=UTF-8 $(MAVEN_OPTS)"
      goals: "test"
      options: "-s $(MAVEN_SETTINGS_FILE) --batch-mode -Dtest.include=$(includeTests)
        -Dtest.exclude=$(excludeTests)
        -Dout=$(Build.SourcesDirectory)/ci/qlog.conf
        -P jacoco,qdbr-coverage,build-web-console
        $(CLIENT_PROFILE) $(MAVEN_RUN_OPTS)"
      jdkVersionOption: $(jdk)
    env:
      QDB_TEST_WINDOWS_SYMLINKS: "1"
      LD_PRELOAD: $(Build.SourcesDirectory)/core/src/main/bin/linux-x86-64/libjemalloc.so
    timeoutInMinutes: 55
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['System.PullRequest.IsFork'], 'false'),
        or(
            eq(variables['CODE_COVERAGE_TOOL_OPTION'], 'JaCoCo'),
            eq(variables['RUST_SOURCE_CODE_CHANGED'], 'true')
        )
      )

  - bash: find . -type f -name 'hs_*.log' -exec sh -c 'x="{}"; mv "$x" "$(ARCHIVED_CRASH_LOG)"' \;
    displayName: "Tests failed -- rename crash dump"
    workingDirectory: $(Build.SourcesDirectory)/core/
    condition: and(failed(), not(eq(variables['os'], 'Windows')))
  - task: PowerShell@2
    inputs:
      targetType: "inline"
      script: |
        Get-ChildItem -Path . -Filter "hs_*.log" -File | ForEach-Object {
            Move-Item -Path $_.FullName -Destination "$(ARCHIVED_CRASH_LOG)"
        }
      workingDirectory: $(Build.SourcesDirectory)\core\
    displayName: "Tests failed -- rename crash dump -- windows"
    condition: and(failed(), eq(variables['os'], 'Windows'))
  - task: PublishBuildArtifacts@1
    displayName: "Tests failed -- Upload crash logs"
    condition: failed()
    inputs:
      pathToPublish: $(ARCHIVED_CRASH_LOG)
      artifactName: CrashDump
  - powershell: |
      $base = "$(QDB_LOG_W_FILE_LOCATION)"
      $dir = Split-Path -Parent $base
      $name = Split-Path -Leaf $base
      $stage = Join-Path "$(Build.BinariesDirectory)" "staged-logs"
      New-Item -ItemType Directory -Force -Path $stage | Out-Null
      Get-ChildItem -Path $dir -Filter "$name*" -File -ErrorAction SilentlyContinue |
        ForEach-Object { Copy-Item $_.FullName (Join-Path $stage $_.Name) -Force }
      Write-Host "Staged log files:"; Get-ChildItem $stage | ForEach-Object { Write-Host "  $($_.Name)" }
    displayName: "Stage log files (Windows)"
    condition: and(failed(), eq(variables['os'], 'Windows'))
    continueOnError: true
  - bash: |
      set -u
      base="$(QDB_LOG_W_FILE_LOCATION)"
      stage="$(Build.BinariesDirectory)/staged-logs"
      mkdir -p "$stage"
      # Glob the per-fork files plus any bare base file.
      shopt -s nullglob
      for f in "$base" "$base".fork-* "$base".*; do
        [ -f "$f" ] && cp -f "$f" "$stage/" || true
      done
      echo "Staged log files:"; ls -la "$stage" || true
    displayName: "Stage log files (non-Windows)"
    condition: and(failed(), ne(variables['os'], 'Windows'))
    continueOnError: true
  - task: ArchiveFiles@2
    displayName: "Tests failed -- Compress logs"
    condition: failed()
    inputs:
      rootFolderOrFile: $(Build.BinariesDirectory)/staged-logs
      includeRootFolder: false
      archiveFile: $(ARCHIVED_LOGS)
      quiet: true
  - task: PublishBuildArtifacts@1
    displayName: "Tests failed -- Upload logs"
    condition: failed()
    inputs:
      pathToPublish: $(ARCHIVED_LOGS)
      artifactName: MavenFailedTestsLogs

  - bash: |
      set -eux
      mv core/target/jacoco.exec $(testset).exec
    displayName: "Prepare partial JaCoCo report for upload"
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['CODE_COVERAGE_TOOL_OPTION'], 'JaCoCo'),
        eq(variables['System.PullRequest.IsFork'], 'false')
      )
  - task: PublishBuildArtifacts@1
    displayName: "Upload partial JaCoCo report"
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['CODE_COVERAGE_TOOL_OPTION'], 'JaCoCo'),
        eq(variables['System.PullRequest.IsFork'], 'false')
      )
    inputs:
      pathToPublish: $(Build.SourcesDirectory)/$(testset).exec
      artifactName: jacoco-coverage
  - bash: |
      set -eux
      export PATH=$LLVM_TOOLS_PATH:$PATH
      # List profraw files for debugging purposes
      find . -name \*.profraw
      PROFRAW="core/questdbr-junit.profraw"
      if [ ! -f "$PROFRAW" ]; then
        echo "LLVM profiling file not found: $PROFRAW"
        exit -1
      fi
      llvm-profdata merge -sparse -o $(testset).profdata "$PROFRAW"

      IGNORE_RE='(.cargo/registry|rustc/.*\.rs)'
      OBJECTS="--object core/target/rust-maven-plugin/qdbr/debug/libquestdbr.so"

      llvm-cov export \
        --format=lcov \
        --ignore-filename-regex="$IGNORE_RE" \
        $OBJECTS \
        --instr-profile=$(testset).profdata \
        > $(testset).lcov
      echo "Generated $(testset).lcov"
    displayName: "Create partial Rust coverage report (LCOV)"
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['RUST_SOURCE_CODE_CHANGED'], 'true'),
        eq(variables['System.PullRequest.IsFork'], 'false')
      )
  - task: PublishBuildArtifacts@1
    displayName: "Upload partial Rust coverage report (LCOV)"
    condition: |
      and(
        startsWith(variables['testset'], 'coverage'),
        eq(variables['RUST_SOURCE_CODE_CHANGED'], 'true'),
        eq(variables['System.PullRequest.IsFork'], 'false')
      )
    inputs:
      pathToPublish: $(Build.SourcesDirectory)/$(testset).lcov
      artifactName: rust-llvm-coverage
