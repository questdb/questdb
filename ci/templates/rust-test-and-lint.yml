parameters:
  shouldRun: true
steps:
  - script: |
      python3 .github/prepare_rust_env.py --export-cargo-install-env --components rustfmt clippy --match core/rust/qdbr/rust-toolchain.toml
    displayName: "Ensure Rust is installed"
    condition: ${{ parameters.shouldRun }}
    # Note, the `prepare_rust_env.py` script exports a number of variables.
  - task: Cache@2
    continueOnError: true
    inputs:
      key: '"cargo-registry" | "$(RUSTC_HOST_TRIPLE)" | "$(RUSTC_RELEASE)"'
      path: $(CARGO_HOME)/registry
    displayName: "Cache ~/.cargo/registry"
    condition: ${{ parameters.shouldRun }}
  - script: |
      cd core/rust/qdb-core
      cargo test --all-targets --all-features --no-fail-fast --verbose
    displayName: "qdb-core: cargo test"
    condition: ${{ parameters.shouldRun }}
    # We run these as part of the other CI runs anyway through the rust-maven-plugin,
    # but if the Rust tests fail it's easier to see the output here
    # since it doesn't get buried thousands of lines deep in the Java test logs.
  - script: |
      cd core/rust/qdb-core
      cargo clippy --all-targets --all-features -- -D warnings
    displayName: "qdb-core: cargo clippy"
    condition: ${{ parameters.shouldRun }}
  - script: |
      cd core/rust/qdb-core
      cargo fmt --check
    displayName: "qdb-core: cargo fmt"
    condition: ${{ parameters.shouldRun }}
  - script: |
      cd core/rust/qdbr
      cargo test --all-targets --all-features --no-fail-fast --verbose
    displayName: "qdbr: cargo test"
    condition: ${{ parameters.shouldRun }}
    # We run these as part of the other CI runs anyway through the rust-maven-plugin,
    # but if the Rust tests fail it's easier to see the output here
    # since it doesn't get buried thousands of lines deep in the Java test logs.
  - script: |
      cd core/rust/qdbr
      cargo clippy --all-targets --all-features -- -D warnings
    displayName: "qdbr: cargo clippy"
    condition: ${{ parameters.shouldRun }}
  - script: |
      cd core/rust/qdbr
      cargo fmt --check
    displayName: "qdbr: cargo fmt"
    condition: ${{ parameters.shouldRun }}

  # ── Rust coverage collection ──────────────────────────────────────────
  # Run all Rust tests with coverage instrumentation and upload the raw
  # profraw files. The CoverageReports stage merges them with Java runs.
  - bash: |
      set -eux
      mkdir -p $(Build.SourcesDirectory)/rust-lint-profraw
      export RUSTFLAGS="-C instrument-coverage -D warnings"
      export LLVM_PROFILE_FILE="$(Build.SourcesDirectory)/rust-lint-profraw/qdb-core-%p-%m.profraw"
      cd core/rust/qdb-core
      cargo test --all-targets --no-fail-fast
    displayName: "qdb-core: cargo test (coverage)"
    condition: |
      and(
        ${{ parameters.shouldRun }},
        eq(variables['System.PullRequest.IsFork'], 'false')
      )

  - bash: |
      set -eux
      mkdir -p $(Build.SourcesDirectory)/rust-lint-profraw
      export RUSTFLAGS="-C instrument-coverage -D warnings"
      export LLVM_PROFILE_FILE="$(Build.SourcesDirectory)/rust-lint-profraw/qdbr-%p-%m.profraw"
      cd core/rust/qdbr
      cargo test --all-targets --no-fail-fast
    displayName: "qdbr: cargo test (coverage)"
    condition: |
      and(
        ${{ parameters.shouldRun }},
        eq(variables['System.PullRequest.IsFork'], 'false')
      )

  - bash: |
      set -eux
      mkdir -p $(Build.SourcesDirectory)/rust-lint-profraw
      export RUSTFLAGS="-C instrument-coverage -D warnings"
      export LLVM_PROFILE_FILE="$(Build.SourcesDirectory)/rust-lint-profraw/parquet2-%p-%m.profraw"
      export PARQUET2_IGNORE_PYARROW_TESTS=1
      git submodule update --init core/rust/qdbr/parquet2/testing/parquet-testing
      cd core/rust/qdbr/parquet2
      cargo test --all-targets --no-fail-fast
    displayName: "parquet2: cargo test (coverage)"
    condition: |
      and(
        ${{ parameters.shouldRun }},
        eq(variables['System.PullRequest.IsFork'], 'false')
      )

  - template: install-llvm.yml
    parameters:
      shouldRun: |
        and(
          ${{ parameters.shouldRun }},
          eq(variables['System.PullRequest.IsFork'], 'false')
        )

  - bash: |
      set -eux
      export PATH=$LLVM_TOOLS_PATH:$PATH

      PARQUET2_TARGET=core/rust/qdbr/parquet2/target/debug
      PROFRAW_DIR=$(Build.SourcesDirectory)/rust-lint-profraw

      # Merge parquet2 profraw files into a single profdata.
      mapfile -t P2_PROFRAW < <(find "$PROFRAW_DIR" -name 'parquet2-*.profraw' | sort)
      if [ ${#P2_PROFRAW[@]} -eq 0 ]; then
        echo "No parquet2 profraw files found, skipping"
        exit 0
      fi
      llvm-profdata merge -sparse -o "$PROFRAW_DIR/parquet2.profdata" "${P2_PROFRAW[@]}"

      # Collect parquet2 test binaries as --object args for llvm-cov.
      mapfile -d '' -t BINS < <(find "$PARQUET2_TARGET/deps" -maxdepth 1 -type f -executable ! -name '*.so' ! -name '*.dylib' ! -name '*.dll' ! -name '*.d' -print0 | sort -z)
      OBJECT_ARGS=()
      for bin in "${BINS[@]}"; do
        OBJECT_ARGS+=(--object "$bin")
      done

      # Export LCOV coverage report — only parquet2 source, no cargo registry noise.
      llvm-cov export \
        --format=lcov \
        --ignore-filename-regex='(.cargo/registry|rustc/.*\.rs)' \
        "${OBJECT_ARGS[@]}" \
        --instr-profile="$PROFRAW_DIR/parquet2.profdata" \
        > "$PROFRAW_DIR/parquet2.lcov"
    displayName: "parquet2: create coverage report (LCOV)"
    condition: |
      and(
        ${{ parameters.shouldRun }},
        eq(variables['System.PullRequest.IsFork'], 'false')
      )

  - task: PublishBuildArtifacts@1
    displayName: "Upload Rust lint coverage profraw files"
    condition: |
      and(
        ${{ parameters.shouldRun }},
        eq(variables['System.PullRequest.IsFork'], 'false')
      )
    inputs:
      pathToPublish: $(Build.SourcesDirectory)/rust-lint-profraw
      artifactName: rust-llvm-coverage