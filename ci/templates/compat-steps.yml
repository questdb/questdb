steps:
  - template: detect-local-client.yml
  - bash: |
      if curl -sf --connect-timeout 2 http://maven.internal:8081/ > /dev/null 2>&1; then
        echo "Private Reposilite cache reachable, using hetzner maven settings"
        echo "##vso[task.setvariable variable=MAVEN_SETTINGS_FILE]$(Build.SourcesDirectory)/ci/maven-settings-hetzner.xml"
        # Allow HTTP keep-alive when routing through the private Reposilite cache.
        # -Dhttp.keepAlive=false opens a new TCP connection per artifact; the single-IP cache
        # reached over the Hetzner vSwitch can't absorb that connection churn under concurrent
        # builds (intermittent "Connect to maven.internal:8081 ... Connection timed out", which
        # the failover-less mirror turns into a build failure). Reusing connections avoids it.
        # NOTE: this toggle only affects the default HttpClient resolver transport. The mvn
        # tasks here run with -Dmaven.resolver.transport=wagon, which ignores it and instead
        # reuses connections via the wagon pool flags in MAVEN_RUN_OPTS
        # (-Dmaven.wagon.http.pool=true + maxPerRoute/maxTotal + ttlSeconds).
        echo "##vso[task.setvariable variable=MAVEN_KEEPALIVE_OPT]"
      else
        echo "Private Reposilite not reachable, using default maven settings"
        echo "##vso[task.setvariable variable=MAVEN_SETTINGS_FILE]$(Build.SourcesDirectory)/ci/maven-settings.xml"
        # Direct-to-Central path: keep historical behaviour (no connection reuse).
        echo "##vso[task.setvariable variable=MAVEN_KEEPALIVE_OPT]-Dhttp.keepAlive=false"
      fi
    displayName: "Select Maven settings (local proxy vs default)"
  - bash: sudo sysctl -w fs.file-max=500000
    displayName: "Increase file count on Linux"
    condition: eq(variables['os'], 'Linux')
  - task: Cache@2
    continueOnError: true
    inputs:
      key: '"questdb_compat" | "$(Agent.OS)" | "$(jdk)" | "maven"'
      restoreKeys: |
        "questdb_compat" | "$(Agent.OS)" | "$(jdk)" | "maven"
      path: $(MAVEN_CACHE_FOLDER)

  - task: Cache@2
    continueOnError: true
    inputs:
      key: '"maven_version" | "$(MAVEN_VERSION)"'
      restoreKeys: mykey | "$(MAVEN_VERSION)"
      path: $(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)
      cacheHitVar: MVN_CACHE_RESTORED
    condition: ne(variables['MAVEN_VERSION_OPTION'], 'Default')

  - script: 'wget https://archive.apache.org/dist/maven/maven-3/$(MAVEN_VERSION)/binaries/apache-maven-$(MAVEN_VERSION)-bin.zip'
    condition: and(ne(variables['MAVEN_VERSION_OPTION'], 'Default'), ne(variables.MVN_CACHE_RESTORED, 'true'), ne(variables['os'], 'Windows'))
  - script: "powershell -Command \"(new-object System.Net.WebClient).DownloadFile('https://www.apache.org/dist/maven/maven-3/$(MAVEN_VERSION)/binaries/apache-maven-$(MAVEN_VERSION)-bin.zip','$(build.sourcesdirectory)\\apache-maven-$(MAVEN_VERSION)-bin.zip')\""
    condition: and(ne(variables['MAVEN_VERSION_OPTION'], 'Default'), ne(variables.MVN_CACHE_RESTORED, 'true'), eq(variables['os'], 'Windows'))
  - task: ExtractFiles@1
    inputs:
      archiveFilePatterns: 'apache-maven-$(MAVEN_VERSION)-bin.zip'
      destinationFolder: '$(build.sourcesdirectory)/maven'
    condition: and(ne(variables['MAVEN_VERSION_OPTION'], 'Default'), ne(variables.MVN_CACHE_RESTORED, 'true'))

  - task: Maven@3
    displayName: "Compile with Maven"
    inputs:
      mavenVersionOption: "$(MAVEN_VERSION_OPTION)"
      mavenDirectory: '$(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)'
      mavenPomFile: "pom.xml"
      mavenOptions: "$(MAVEN_OPTS)"
      options:
        "-s $(MAVEN_SETTINGS_FILE) compile $(javadoc_step) -DskipTests -P build-web-console$(javadoc_profile) $(CLIENT_PROFILE) $(MAVEN_RUN_OPTS)"
      jdkVersionOption: $(jdk)
    condition:
      eq(variables['SOURCE_CODE_CHANGED'], 'false')
  - task: Maven@3
    displayName: "Run tests"
    inputs:
      mavenVersionOption: "$(MAVEN_VERSION_OPTION)"
      mavenDirectory: '$(build.sourcesdirectory)/maven/apache-maven-$(MAVEN_VERSION)'
      mavenPomFile: "pom.xml"
      mavenOptions: "$(MAVEN_OPTS)"
      goals: "clean test"
      options:
        "-s $(MAVEN_SETTINGS_FILE) --batch-mode --quiet -Dtest.include=**/compat/**,**/cliutil/**
        -Dout=$(Build.SourcesDirectory)/ci/qlog.conf
        -DfailIfNoTests=false
        -Dsurefire.failIfNoSpecifiedTests=false
         $(CLIENT_PROFILE) $(MAVEN_RUN_OPTS)"
      jdkVersionOption: $(jdk)
    timeoutInMinutes: 55
    condition: |
      eq(variables['SOURCE_CODE_CHANGED'], 'true')
  - bash: |
      find . -type f -name 'hs_*.log' -exec sh -c 'x="{}"; mv "$x" "$(ARCHIVED_CRASH_LOG)"' \;
    displayName: "Tests failed -- rename crash dump"
    workingDirectory: $(Build.SourcesDirectory)/compat/
    condition: failed()
  - task: PublishBuildArtifacts@1
    displayName: "Tests failed -- Upload crash logs"
    condition: failed()
    inputs:
      pathToPublish: $(ARCHIVED_CRASH_LOG)
      artifactName: CrashDump
  - powershell: |
      $base = "$(QDB_LOG_W_FILE_LOCATION)"
      $dir = Split-Path -Parent $base
      $name = Split-Path -Leaf $base
      $stage = Join-Path "$(Build.BinariesDirectory)" "staged-logs"
      New-Item -ItemType Directory -Force -Path $stage | Out-Null
      Get-ChildItem -Path $dir -Filter "$name*" -File -ErrorAction SilentlyContinue |
        ForEach-Object { Copy-Item $_.FullName (Join-Path $stage $_.Name) -Force }
      Write-Host "Staged log files:"; Get-ChildItem $stage | ForEach-Object { Write-Host "  $($_.Name)" }
    displayName: "Stage log files (Windows)"
    condition: and(not(succeeded()), eq(variables['os'], 'Windows'))
    continueOnError: true
  - bash: |
      set -u
      base="$(QDB_LOG_W_FILE_LOCATION)"
      stage="$(Build.BinariesDirectory)/staged-logs"
      mkdir -p "$stage"
      # Glob the per-fork files plus any bare base file.
      shopt -s nullglob
      for f in "$base" "$base".fork-* "$base".*; do
        [ -f "$f" ] && cp -f "$f" "$stage/" || true
      done
      echo "Staged log files:"; ls -la "$stage" || true
    displayName: "Stage log files (non-Windows)"
    condition: and(not(succeeded()), ne(variables['os'], 'Windows'))
    continueOnError: true
  - task: ArchiveFiles@2
    displayName: "Tests failed -- Compress logs"
    condition: not(succeeded())
    inputs:
      rootFolderOrFile: $(Build.BinariesDirectory)/staged-logs
      includeRootFolder: false
      archiveFile: $(ARCHIVED_LOGS)
      quiet: true
  - task: PublishBuildArtifacts@1
    displayName: "Tests failed -- Upload logs"
    condition: not(succeeded())
    inputs:
      pathToPublish: $(ARCHIVED_LOGS)
      artifactName: MavenFailedTestsLogs
