jobs:
  - job: RunOn
    displayName: "on"
    strategy:
      matrix:
        # QWP-only matrix for hunting flaky QwpIngressOracleFuzzTest etc.
        # Original entries (mac-griffin, mac-cairo, mac-cairo-fuzz, mac-pgwire,
        # windows-griffin-base, windows-griffin-sub, windows-fuzz1, windows-cairo-1,
        # windows-cairo-2, windows-pgwire, windows-other-1) deleted on this branch.
        mac-other:
          imageName: "macos-14"
          poolName: "Azure Pipelines"
          os: macOS
          jdk: "1.25"
          testset: "all"
          includeTests: "**/cutlass/qwp/**"
          javadoc_step: ""
          javadoc_profile: ""
        windows-fuzz2:
          WEB_CONSOLE_PROFILE: ""
          imageName: "windows-latest"
          poolName: "Azure Pipelines"
          os: Windows
          jdk: "1.25"
          testset: "all"
          includeTests: "**/cutlass/qwp/**"
          javadoc_step: ""
          javadoc_profile: ""
        windows-other-2:
          WEB_CONSOLE_PROFILE: ""
          imageName: "windows-latest"
          poolName: "Azure Pipelines"
          os: Windows
          jdk: "1.25"
          testset: "all"
          includeTests: "**/cutlass/qwp/**"
          javadoc_step: ""
          javadoc_profile: ""

    pool:
      vmImage: $(imageName)
      name: $(poolName)
    timeoutInMinutes: 60
    variables:
      SOURCE_CODE_CHANGED: $[stageDependencies.CheckChanges.CheckChanges.outputs['check_coverage.SOURCE_CODE_CHANGED']]
      RUST_SOURCE_CODE_CHANGED: $[stageDependencies.CheckChanges.CheckChanges.outputs['check_coverage.RUST_SOURCE_CODE_CHANGED']]
      COVERAGE_DIFF: $[stageDependencies.CheckChanges.CheckChanges.outputs['check_coverage.COVERAGE_DIFF']]
      CODE_COVERAGE_TOOL_OPTION: $[stageDependencies.CheckChanges.CheckChanges.outputs['check_coverage.CODE_COVERAGE_TOOL_OPTION']]
      DIFF_COVER_THRESHOLD_PCT: 50
      ARCHIVED_CRASH_LOG: "$(Build.ArtifactStagingDirectory)/questdb-crash-$(Build.SourceBranchName)-$(Build.SourceVersion)-$(System.StageAttempt)-$(Agent.OS)-$(jdk).log"
      MAVEN_OPTS: "-Xmx2g -XX:+UseParallelGC"
      # Hosted groups only run core-module tests; compile just core and its deps.
      TEST_REACTOR_ARGS: "-pl core -am"
    steps:
      - template: steps.yml
