trigger:
  branches:
    exclude:
      - "*"
  tags:
    include:
      - '*.*.*'

pr: none

schedules:
  - cron: "0 0 * * *"
    displayName: Midnight Trigger
    branches:
      include:
        - master

# Define variable at the top level
variables:
  SKIP_VALIDATION: 'false'  # Set to 'true' to skip validation

jobs:
  - job: BuildAmd64
    displayName: "Build and push docker (amd64)"
    pool: hetzner-incus
    timeoutInMinutes: 60
    steps:
      - checkout: self
        fetchDepth: 1
        lfs: false
        submodules: true

      - bash: |
          tag=$(Build.SourceBranchName)
          echo "Checking tag: $tag"

          if [[ ! $tag =~ ^\d+(\.\d+)*$ ]]; then
            echo "Tag '$tag' is not a pure numeric version (x.y.z) - skipping build"
            echo "Valid tags should only contain numbers and dots (e.g., 1.2.3, 10.0.5)"
            echo "##vso[task.complete result=Succeeded;]Skipping build for non-numeric version tag"
            exit 0
          fi

          echo "Tag '$tag' is a valid numeric version, continuing with build"
        displayName: 'Validate semantic version format'
        condition: and(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), ne(variables['SKIP_VALIDATION'], 'true'))

      - task: Docker@2
        inputs:
          command: 'login'
          containerRegistry: serviceaccountquestdb

      - task: CmdLine@2
        displayName: Build and push amd64 images
        inputs:
          script: |
            set -eo pipefail
            ARCH=amd64

            if [ "$(Build.SourceBranch)" = "refs/heads/master" ]; then
              docker build -t questdb/questdb:nightly-${ARCH} .
              docker push questdb/questdb:nightly-${ARCH}
              docker build -t questdb/questdb:nightly-rhel-${ARCH} --target rhel .
              docker push questdb/questdb:nightly-rhel-${ARCH}

            elif [[ "$(Build.SourceBranch)" == refs/tags/* ]]; then
              tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
              echo "Tag release: $tag_name"
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${tag_name}-${ARCH} .
              docker push questdb/questdb:${tag_name}-${ARCH}
              pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
              if [[ "$tag_name" =~ $pattern ]]; then
                docker tag questdb/questdb:${tag_name}-${ARCH} questdb/questdb:latest-${ARCH}
                docker push questdb/questdb:latest-${ARCH}
              fi
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${tag_name}-rhel-${ARCH} --target rhel .
              docker push questdb/questdb:${tag_name}-rhel-${ARCH}

            else
              tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
              docker_tag_name=patch-$(echo $(Build.SourceVersion) | cut -c 1-7)
              echo "Branch release: $docker_tag_name"
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${docker_tag_name}-${ARCH} .
              docker push questdb/questdb:${docker_tag_name}-${ARCH}
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${docker_tag_name}-rhel-${ARCH} --target rhel .
              docker push questdb/questdb:${docker_tag_name}-rhel-${ARCH}
            fi
          workingDirectory: core

  - job: BuildArm64
    displayName: "Build and push docker (arm64)"
    pool: hetzner-incus-arm
    timeoutInMinutes: 60
    steps:
      - checkout: self
        fetchDepth: 1
        lfs: false
        submodules: true

      - task: Docker@2
        inputs:
          command: 'login'
          containerRegistry: serviceaccountquestdb

      - task: CmdLine@2
        displayName: Build and push arm64 images
        inputs:
          script: |
            set -eo pipefail
            ARCH=arm64

            if [ "$(Build.SourceBranch)" = "refs/heads/master" ]; then
              docker build -t questdb/questdb:nightly-${ARCH} .
              docker push questdb/questdb:nightly-${ARCH}
              docker build -t questdb/questdb:nightly-rhel-${ARCH} --target rhel .
              docker push questdb/questdb:nightly-rhel-${ARCH}

            elif [[ "$(Build.SourceBranch)" == refs/tags/* ]]; then
              tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
              echo "Tag release: $tag_name"
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${tag_name}-${ARCH} .
              docker push questdb/questdb:${tag_name}-${ARCH}
              pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
              if [[ "$tag_name" =~ $pattern ]]; then
                docker tag questdb/questdb:${tag_name}-${ARCH} questdb/questdb:latest-${ARCH}
                docker push questdb/questdb:latest-${ARCH}
              fi
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${tag_name}-rhel-${ARCH} --target rhel .
              docker push questdb/questdb:${tag_name}-rhel-${ARCH}

            else
              tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
              docker_tag_name=patch-$(echo $(Build.SourceVersion) | cut -c 1-7)
              echo "Branch release: $docker_tag_name"
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${docker_tag_name}-${ARCH} .
              docker push questdb/questdb:${docker_tag_name}-${ARCH}
              docker build --build-arg tag_name=$tag_name -t questdb/questdb:${docker_tag_name}-rhel-${ARCH} --target rhel .
              docker push questdb/questdb:${docker_tag_name}-rhel-${ARCH}
            fi
          workingDirectory: core

  - job: CreateManifest
    displayName: "Create multi-arch manifests"
    dependsOn:
      - BuildAmd64
      - BuildArm64
    pool: hetzner-incus
    timeoutInMinutes: 15
    steps:
      - checkout: none

      - task: Docker@2
        inputs:
          command: 'login'
          containerRegistry: serviceaccountquestdb

      - task: CmdLine@2
        displayName: Download latest openshift-preflight tool
        inputs:
          script: |
            sudo wget https://github.com/redhat-openshift-ecosystem/openshift-preflight/releases/latest/download/preflight-linux-amd64 -O /usr/local/bin/preflight
            sudo chmod +x /usr/local/bin/preflight
            which preflight
            preflight version

      - task: CmdLine@2
        displayName: Create and push multi-arch manifests
        inputs:
          script: |
            set -eo pipefail

            create_and_push_manifest() {
              local tag=$1
              echo "Creating manifest for questdb/questdb:${tag}"
              docker manifest create questdb/questdb:${tag} \
                questdb/questdb:${tag}-amd64 \
                questdb/questdb:${tag}-arm64
              docker manifest push questdb/questdb:${tag}
            }

            if [ "$(Build.SourceBranch)" = "refs/heads/master" ]; then
              create_and_push_manifest "nightly"
              create_and_push_manifest "nightly-rhel"
              preflight check container questdb/questdb:nightly-rhel

            elif [[ "$(Build.SourceBranch)" == refs/tags/* ]]; then
              tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
              create_and_push_manifest "${tag_name}"
              pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
              if [[ "$tag_name" =~ $pattern ]]; then
                create_and_push_manifest "latest"
              fi
              create_and_push_manifest "${tag_name}-rhel"
              preflight check container questdb/questdb:${tag_name}-rhel

            else
              docker_tag_name=patch-$(echo $(Build.SourceVersion) | cut -c 1-7)
              create_and_push_manifest "${docker_tag_name}"
              create_and_push_manifest "${docker_tag_name}-rhel"
              preflight check container questdb/questdb:${docker_tag_name}-rhel
            fi

      #- task: CmdLine@2
      #  displayName: Scan docker images for vulnerabilities
      #  inputs:
      #    script: |
      #      # Determine the tag to scan
      #      if [ "$(Build.SourceBranch)" = "refs/heads/master" ]; then
      #        tags="nightly nightly-rhel"
      #      elif [[ "$(Build.SourceBranch)" == refs/tags/* ]]; then
      #        tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
      #        tags="${tag_name} ${tag_name}-rhel"
      #      else
      #        docker_tag_name=patch-$(echo $(Build.SourceVersion) | cut -c 1-7)
      #        tags="${docker_tag_name} ${docker_tag_name}-rhel"
      #      fi
      #      for t in $tags; do
      #        echo "Scanning image: questdb/questdb:${t}"
      #        trivy image --exit-code 1 --severity HIGH,CRITICAL "questdb/questdb:${t}"
      #      done

      - task: CmdLine@2
        displayName: Notify Slack on Failure
        inputs:
          script: |
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"🚨 *Docker Build Failed (OSS)*\n\nBranch: `$(Build.SourceBranchName)`\nBuild: <$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)|#$(Build.BuildId)>\nCommit: `$(Build.SourceVersion)`"}' \
              "$(BUILDS_SLACK_HOOK_URL)"
        condition: failed()
        env:
          BUILDS_SLACK_HOOK_URL: $(BUILDS_SLACK_HOOK_URL)
