trigger:
  branches:
    exclude:
      - "*"
  tags:
    include:
      - '*.*.*'

pr: none

schedules:
  - cron: "0 0 * * *"
    displayName: Midnight Trigger
    branches:
      include:
        - master

# Define variable at the top level
variables:
  SKIP_VALIDATION: 'false'  # Set to 'true' to skip validation
  IMAGE_REPO: questdb/questdb

jobs:
  - job: BuildAmd64
    displayName: "Build amd64"
    pool: hetzner-incus
    timeoutInMinutes: 60
    variables:
      BUILDX_PLATFORM: linux/amd64
    steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false

      - bash: |
          tag=$(Build.SourceBranchName)
          echo "Checking tag: $tag"

          if [[ ! $tag =~ ^\d+(\.\d+)*$ ]]; then
            echo "Tag '$tag' is not a pure numeric version (x.y.z) - skipping build"
            echo "Valid tags should only contain numbers and dots (e.g., 1.2.3, 10.0.5)"
            echo "##vso[task.complete result=Succeeded;]Skipping build for non-numeric version tag"
            exit 0
          fi

          echo "Tag '$tag' is a valid numeric version, continuing with build"
        displayName: 'Validate semantic version format'
        condition: and(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), ne(variables['SKIP_VALIDATION'], 'true'))

      - task: Docker@2
        inputs:
          command: 'login'
          containerRegistry: serviceaccountquestdb

      - task: CmdLine@2
        displayName: Setup docker buildx
        inputs:
          script: |
            docker buildx create --use

      - task: CmdLine@2
        name: NightlyBuild
        displayName: Release Nightly MASTER (amd64)
        inputs:
          script: |
            set -eo pipefail
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-nightly.json .
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) --target rhel \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-nightly-rhel.json .
            digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-nightly.json)
            rhel_digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-nightly-rhel.json)
            echo "nightly digest: $digest"
            echo "nightly-rhel digest: $rhel_digest"
            echo "##vso[task.setvariable variable=nightlyDigest;isOutput=true]$digest"
            echo "##vso[task.setvariable variable=nightlyRhelDigest;isOutput=true]$rhel_digest"
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))

      - task: CmdLine@2
        name: TagBuild
        displayName: Release Tag (amd64)
        inputs:
          script: |
            set -eo pipefail
            # Cannot use Build.SourceBranchName if a tag name contains a "/", since the var only returns the final path component
            # We use cut instead to trim the first 2 components off the Build.SourceBranch ("refs/tags")
            tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
            echo $tag_name
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-tag.json .
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) --target rhel \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-tag-rhel.json .
            digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-tag.json)
            rhel_digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-tag-rhel.json)
            echo "tag digest: $digest"
            echo "tag-rhel digest: $rhel_digest"
            echo "##vso[task.setvariable variable=tagDigest;isOutput=true]$digest"
            echo "##vso[task.setvariable variable=tagRhelDigest;isOutput=true]$rhel_digest"
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))

      - task: CmdLine@2
        name: BranchBuild
        displayName: Release Commit from Branch (amd64)
        inputs:
          script: |
            set -eo pipefail
            # Cannot use Build.SourceBranchName if a branch name contains a "/", since the var only returns the final path component
            # We use cut instead to trim the first 2 components off the Build.SourceBranch ("refs/heads")
            tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
            echo $tag_name
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-branch.json .
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) --target rhel \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-branch-rhel.json .
            digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-branch.json)
            rhel_digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-branch-rhel.json)
            echo "branch digest: $digest"
            echo "branch-rhel digest: $rhel_digest"
            echo "##vso[task.setvariable variable=branchDigest;isOutput=true]$digest"
            echo "##vso[task.setvariable variable=branchRhelDigest;isOutput=true]$rhel_digest"
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/'), ne(variables['Build.SourceBranch'], 'refs/heads/master'))

  - job: BuildArm64
    displayName: "Build arm64"
    pool: hetzner-incus-arm
    timeoutInMinutes: 60
    variables:
      BUILDX_PLATFORM: linux/arm64
    steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false

      - bash: |
          tag=$(Build.SourceBranchName)
          echo "Checking tag: $tag"

          if [[ ! $tag =~ ^\d+(\.\d+)*$ ]]; then
            echo "Tag '$tag' is not a pure numeric version (x.y.z) - skipping build"
            echo "Valid tags should only contain numbers and dots (e.g., 1.2.3, 10.0.5)"
            echo "##vso[task.complete result=Succeeded;]Skipping build for non-numeric version tag"
            exit 0
          fi

          echo "Tag '$tag' is a valid numeric version, continuing with build"
        displayName: 'Validate semantic version format'
        condition: and(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), ne(variables['SKIP_VALIDATION'], 'true'))

      - task: Docker@2
        inputs:
          command: 'login'
          containerRegistry: serviceaccountquestdb

      - task: CmdLine@2
        displayName: Setup docker buildx
        inputs:
          script: |
            docker buildx create --use

      - task: CmdLine@2
        name: NightlyBuild
        displayName: Release Nightly MASTER (arm64)
        inputs:
          script: |
            set -eo pipefail
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-nightly.json .
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) --target rhel \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-nightly-rhel.json .
            digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-nightly.json)
            rhel_digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-nightly-rhel.json)
            echo "nightly digest: $digest"
            echo "nightly-rhel digest: $rhel_digest"
            echo "##vso[task.setvariable variable=nightlyDigest;isOutput=true]$digest"
            echo "##vso[task.setvariable variable=nightlyRhelDigest;isOutput=true]$rhel_digest"
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))

      - task: CmdLine@2
        name: TagBuild
        displayName: Release Tag (arm64)
        inputs:
          script: |
            set -eo pipefail
            tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
            echo $tag_name
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-tag.json .
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) --target rhel \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-tag-rhel.json .
            digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-tag.json)
            rhel_digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-tag-rhel.json)
            echo "tag digest: $digest"
            echo "tag-rhel digest: $rhel_digest"
            echo "##vso[task.setvariable variable=tagDigest;isOutput=true]$digest"
            echo "##vso[task.setvariable variable=tagRhelDigest;isOutput=true]$rhel_digest"
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))

      - task: CmdLine@2
        name: BranchBuild
        displayName: Release Commit from Branch (arm64)
        inputs:
          script: |
            set -eo pipefail
            tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
            echo $tag_name
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-branch.json .
            docker buildx build -f core/Dockerfile --platform $(BUILDX_PLATFORM) --target rhel \
              --build-arg tag_name=$tag_name \
              --output "type=image,name=$(IMAGE_REPO),push-by-digest=true,push=true" \
              --metadata-file meta-branch-rhel.json .
            digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-branch.json)
            rhel_digest=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['containerimage.digest'])" meta-branch-rhel.json)
            echo "branch digest: $digest"
            echo "branch-rhel digest: $rhel_digest"
            echo "##vso[task.setvariable variable=branchDigest;isOutput=true]$digest"
            echo "##vso[task.setvariable variable=branchRhelDigest;isOutput=true]$rhel_digest"
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/'), ne(variables['Build.SourceBranch'], 'refs/heads/master'))

  - job: Manifest
    displayName: "Combine multi-arch manifests and publish"
    pool: hetzner-incus
    dependsOn:
      - BuildAmd64
      - BuildArm64
    condition: succeeded()
    timeoutInMinutes: 30
    variables:
      amd64NightlyDigest: $[ dependencies.BuildAmd64.outputs['NightlyBuild.nightlyDigest'] ]
      amd64NightlyRhelDigest: $[ dependencies.BuildAmd64.outputs['NightlyBuild.nightlyRhelDigest'] ]
      arm64NightlyDigest: $[ dependencies.BuildArm64.outputs['NightlyBuild.nightlyDigest'] ]
      arm64NightlyRhelDigest: $[ dependencies.BuildArm64.outputs['NightlyBuild.nightlyRhelDigest'] ]
      amd64TagDigest: $[ dependencies.BuildAmd64.outputs['TagBuild.tagDigest'] ]
      amd64TagRhelDigest: $[ dependencies.BuildAmd64.outputs['TagBuild.tagRhelDigest'] ]
      arm64TagDigest: $[ dependencies.BuildArm64.outputs['TagBuild.tagDigest'] ]
      arm64TagRhelDigest: $[ dependencies.BuildArm64.outputs['TagBuild.tagRhelDigest'] ]
      amd64BranchDigest: $[ dependencies.BuildAmd64.outputs['BranchBuild.branchDigest'] ]
      amd64BranchRhelDigest: $[ dependencies.BuildAmd64.outputs['BranchBuild.branchRhelDigest'] ]
      arm64BranchDigest: $[ dependencies.BuildArm64.outputs['BranchBuild.branchDigest'] ]
      arm64BranchRhelDigest: $[ dependencies.BuildArm64.outputs['BranchBuild.branchRhelDigest'] ]
    steps:
      - checkout: none

      - task: CmdLine@2
        displayName: Download latest openshift-preflight tool
        inputs:
          script: |
            sudo wget https://github.com/redhat-openshift-ecosystem/openshift-preflight/releases/latest/download/preflight-linux-amd64 -O /usr/local/bin/preflight
            sudo chmod +x /usr/local/bin/preflight
            which preflight
            preflight version

      - task: Docker@2
        inputs:
          command: 'login'
          containerRegistry: serviceaccountquestdb

      - task: CmdLine@2
        displayName: Combine Nightly MASTER manifests
        inputs:
          script: |
            set -eo pipefail
            docker buildx imagetools create -t $(IMAGE_REPO):nightly \
              $(IMAGE_REPO)@$(amd64NightlyDigest) \
              $(IMAGE_REPO)@$(arm64NightlyDigest)
            docker buildx imagetools create -t $(IMAGE_REPO):nightly-rhel \
              $(IMAGE_REPO)@$(amd64NightlyRhelDigest) \
              $(IMAGE_REPO)@$(arm64NightlyRhelDigest)
            preflight check container $(IMAGE_REPO):nightly-rhel
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))

      - task: CmdLine@2
        displayName: Combine Release Tag manifests
        inputs:
          script: |
            set -eo pipefail
            tag_name=$(echo "$(Build.SourceBranch)" | cut -d'/' -f '3-')
            echo $tag_name
            pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
            docker buildx imagetools create -t $(IMAGE_REPO):$tag_name \
              $(IMAGE_REPO)@$(amd64TagDigest) \
              $(IMAGE_REPO)@$(arm64TagDigest)
            if [[ "$tag_name" =~ $pattern ]]; then
              echo "labeling latest"
              docker buildx imagetools create -t $(IMAGE_REPO):latest \
                $(IMAGE_REPO)@$(amd64TagDigest) \
                $(IMAGE_REPO)@$(arm64TagDigest)
            fi
            docker buildx imagetools create -t $(IMAGE_REPO):$tag_name-rhel \
              $(IMAGE_REPO)@$(amd64TagRhelDigest) \
              $(IMAGE_REPO)@$(arm64TagRhelDigest)
            preflight check container $(IMAGE_REPO):$tag_name-rhel
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))

      - task: CmdLine@2
        displayName: Combine Release Commit from Branch manifests
        inputs:
          script: |
            set -eo pipefail
            docker_tag_name=patch-$(echo $(Build.SourceVersion) | cut -c 1-7)
            echo $docker_tag_name
            docker buildx imagetools create -t $(IMAGE_REPO):${docker_tag_name} \
              $(IMAGE_REPO)@$(amd64BranchDigest) \
              $(IMAGE_REPO)@$(arm64BranchDigest)
            docker buildx imagetools create -t $(IMAGE_REPO):${docker_tag_name}-rhel \
              $(IMAGE_REPO)@$(amd64BranchRhelDigest) \
              $(IMAGE_REPO)@$(arm64BranchRhelDigest)
            preflight check container $(IMAGE_REPO):${docker_tag_name}-rhel
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/'), ne(variables['Build.SourceBranch'], 'refs/heads/master'))

  - job: NotifyOnFailure
    displayName: "Notify Slack on failure"
    pool: hetzner-incus
    dependsOn:
      - BuildAmd64
      - BuildArm64
      - Manifest
    condition: failed()
    steps:
      - checkout: none

      - task: CmdLine@2
        displayName: Notify Slack on Failure
        inputs:
          script: |
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"🚨 *Docker Build Failed (OSS)*\n\nBranch: `$(Build.SourceBranchName)`\nBuild: <$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)|#$(Build.BuildId)>\nCommit: `$(Build.SourceVersion)`"}' \
              "$(BUILDS_SLACK_HOOK_URL)"
        env:
          BUILDS_SLACK_HOOK_URL: $(BUILDS_SLACK_HOOK_URL)
