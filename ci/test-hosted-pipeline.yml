# On-demand macOS/Windows test pipeline.
trigger: none

pr:
  branches:
    include:
      - master
  drafts: false

variables:
  QDB_LOG_W_FILE_LOCATION: "$(Build.BinariesDirectory)/tests.log"
  ARCHIVED_LOGS: "$(Build.ArtifactStagingDirectory)/questdb-$(Build.SourceBranchName)-$(Build.SourceVersion)-$(System.StageAttempt)-$(Agent.OS)-$(jdk).zip"
  DIFF_COVER_THRESHOLD_PCT: 50
  excludeTests: ""
  includeTests: "%regex[.*[^o].class]"
  MAVEN_CACHE_FOLDER: $(HOME)/.m2/repository
  MAVEN_OPTS: "-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER) -Xmx3g -XX:+UseParallelGC"
  MAVEN_RUN_OPTS: "-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER) -Dmaven.resolver.transport=wagon -Dmaven.wagon.httpconnectionManager.ttlSeconds=30 "
  MAVEN_VERSION: "version"
  MAVEN_VERSION_OPTION: "Default"
  # Hosted mac/windows jobs (hosted-jobs.yml) override this to "-pl core -am" and
  # drop the unused web console.
  TEST_REACTOR_ARGS: ""
  WEB_CONSOLE_PROFILE: "-P build-web-console"

stages:
  - stage: CheckChanges
    displayName: "Check Changes"
    jobs:
      - template: templates/check-changes-job.yml

  - stage: HostedRunTestsBranches
    displayName: "Hosted Running tests"
    dependsOn:
      - CheckChanges
    jobs:
      - template: templates/hosted-jobs.yml

  # Binary smoke test (self-hosted Linux).
  #
  # Intent: this is deliberately NOT a per-commit check. Now that the native
  # libraries are built from source instead of committed, we want a single
  # end-to-end verification per PR that the packaged distribution actually
  # builds, starts, and answers a query. It is placed in this on-demand
  # ("macwin") pipeline -- which is triggered manually (/azp run) once per PR,
  # typically at the end before merge -- precisely so it does not run on every
  # push. It runs on self-hosted Linux boxes (they carry the Rust toolchain and
  # C compiler) independently of the hosted macOS/Windows test jobs above.
  - stage: BinarySmokeTest
    displayName: "Binary smoke test"
    dependsOn: []
    jobs:
      - template: templates/binary-smoke-test-jobs.yml
