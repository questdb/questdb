# cargo-deny configuration for license compliance
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally:
#   cargo deny check licenses    # check license compatibility
#   cargo deny check advisories  # check for known vulnerabilities
#   cargo deny list --layout license  # list all dependency licenses

[graph]
all-features = false
no-default-features = false

[advisories]
# qdb-sqllogictest is a test-only tool, not shipped in production.
# These advisories come from the test harness and its dependencies (tokio,
# miniz_oxide, the tokio-postgres client stack, anyhow) that are not worth
# upgrading here. The postgres DoS advisories require a malicious or MITM
# server; the harness connects only to a trusted local QuestDB under test.
# The tokio and anyhow unsoundness advisories are in APIs (broadcast
# channels, Error::downcast_mut) the harness never calls.
ignore = [
    { id = "RUSTSEC-2025-0056", reason = "adler is a transitive dep of tokio/backtrace, test-only" },
    { id = "RUSTSEC-2025-0023", reason = "tokio broadcast channel unsoundness, not used in test harness" },
    { id = "RUSTSEC-2026-0178", reason = "tokio-postgres DataRow panic, DoS from a malicious server; harness talks only to a trusted local QuestDB" },
    { id = "RUSTSEC-2026-0179", reason = "postgres-protocol SCRAM iteration-count DoS from a malicious server; harness talks only to a trusted local QuestDB" },
    { id = "RUSTSEC-2026-0180", reason = "postgres-protocol hstore decode panic, DoS from a malicious server; harness talks only to a trusted local QuestDB" },
    { id = "RUSTSEC-2026-0190", reason = "anyhow Error::downcast_mut unsoundness, not called in test harness" },
]

[licenses]
# Licenses compatible with Apache-2.0 redistribution.
# This allow-list includes only licenses that permit redistribution
# under the Apache License 2.0 without additional obligations
# that conflict with Apache-2.0 terms.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "OpenSSL",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

# Ring uses a non-standard license file. This clarification tells cargo-deny
# how to interpret it. The hash must match the actual LICENSE file contents;
# if ring updates its LICENSE, this hash will need updating.
#[[licenses.clarify]]
#crate = "ring"
#expression = "MIT AND ISC AND OpenSSL"
#license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
